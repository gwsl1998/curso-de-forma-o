<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva - PCRR</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0073CF;
            --accent-gold: #D4AF37;
            --danger-red: #cc0000;
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #ffffff 0%, #dfe6e9 100%);
            color: var(--text-dark);
        }

        .main-container {
            text-align: center;
            background-color: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-top: 8px solid var(--accent-gold);
            width: 90%;
            max-width: 750px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-badge {
            width: 100px;
            margin-bottom: 20px;
        }

        .relogio-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .caixa {
            background: #f8f9fa;
            padding: 15px 5px;
            border-radius: 18px;
            min-width: 100px;
            border-bottom: 6px solid var(--primary-blue);
        }

        .numero {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 1;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #b2bec3;
            margin-top: 8px;
            display: block;
        }

        /* --- NOVA SEÇÃO DA IMAGEM --- */
        .container-imagem {
            width: 100%;
            margin-bottom: 15px; /* Espaço entre imagem e barra */
            border-radius: 15px;
            overflow: hidden; /* Garante que a imagem respeite o arredondamento */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .imagem-destaque {
            width: 100%;        /* Ocupa toda a largura do container */
            max-width: 100%;    /* Não deixa a imagem estourar */
            height: auto;       /* MANTÉM A PROPORÇÃO CORRETA */
            display: block;     /* Remove espaços extras abaixo da imagem */
        }
        /* ---------------------------- */

        .progress-wrapper {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
            width: 0%;
            transition: width 1s linear;
        }

        .vermelho-destaque {
            color: var(--danger-red); 
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-audio {
            background: #f1f3f5;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-share {
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .numero { font-size: 2rem; }
            .caixa { min-width: 75px; }
            .vermelho-destaque { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <audio id="musicaFundo" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <img src="brasao_pcrr.png" alt="Brasão PCRR" class="top-badge">
        
        <div class="relogio-container">
            <div class="caixa">
                <span class="numero" id="dias">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="caixa">
                <span class="numero" id="horas">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="caixa">
                <span class="numero" id="minutos">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="caixa" style="border-bottom-color: var(--danger-red);">
                <span class="numero" id="segundos" style="color: var(--danger-red);">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <!-- IMAGEM ACIMA DA BARRA DE PROGRESSO -->
        <div class="container-imagem">
            <!-- Substitua 'foto-curso.jpg' pelo nome do seu arquivo de imagem -->
            <img src="foto-curso.jpg" alt="Curso PCRR" class="imagem-destaque">
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p style="font-weight: 600; color: #636e72;">Para o início do</p>
        <h1 class="vermelho-destaque">Curso de Formação PCRR</h1>

        <div class="controls">
            <button id="btnMusica" class="btn-audio">
                <i class="fas fa-play"></i> Ativar Trilha Sonora
            </button>

            <a href="#" id="whatsappBtn" class="btn-share" target="_blank">
                <i class="fab fa-whatsapp"></i> Compartilhar progresso
            </a>
        </div>
    </div>

    <script>
        // Lógica da Música
        const musica = document.getElementById('musicaFundo');
        const btnMusica = document.getElementById('btnMusica');
        
        btnMusica.addEventListener('click', function() {
            if (musica.paused) {
                musica.play();
                btnMusica.innerHTML = '<i class="fas fa-pause"></i> Pausar Trilha';
            } else {
                musica.pause();
                btnMusica.innerHTML = '<i class="fas fa-play"></i> Ativar Trilha Sonora';
            }
        });

        // Lógica do Relógio e Barra
        function atualizarTudo() {
            const dataFinal = new Date(2026, 8, 8, 0, 0, 0).getTime();
            const dataInicioRef = new Date(2024, 0, 1).getTime();

            setInterval(function() {
                const agora = new Date().getTime();
                const total = dataFinal - agora;

                const d = Math.floor(total / (1000 * 60 * 60 * 24));
                const h = Math.floor((total % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((total % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((total % (1000 * 60)) / 1000);

                document.getElementById('dias').innerText = d.toString().padStart(2, '0');
                document.getElementById('horas').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutos').innerText = m.toString().padStart(2, '0');
                document.getElementById('segundos').innerText = s.toString().padStart(2, '0');

                // Barra de Progresso
                const totalJornada = dataFinal - dataInicioRef;
                const decorrido = agora - dataInicioRef;
                const perc = (decorrido / totalJornada) * 100;
                document.getElementById('progressBar').style.width = Math.min(Math.max(perc, 0), 100) + "%";

                // WhatsApp
                const link = `https://wa.me/?text=${encodeURIComponent('Faltam ' + d + ' dias para o Curso de Formação PCRR! 💀')}`;
                document.getElementById('whatsappBtn').href = link;

            }, 1000);
        }
        atualizarTudo();
    </script>
</body>
</html>
