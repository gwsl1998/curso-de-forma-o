<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva - PCRR</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0073CF;
            --accent-gold: #D4AF37;
            --danger-red: #cc0000;
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #ffffff 0%, #dfe6e9 100%);
            color: var(--text-dark);
            padding: 20px;
        }

        .main-container {
            text-align: center;
            background-color: white;
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-top: 8px solid var(--accent-gold);
            width: 100%;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-badge {
            width: 90px;
            margin-bottom: 15px;
        }

        .relogio-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: nowrap;
        }

        .caixa {
            background: #f8f9fa;
            padding: 15px 5px;
            border-radius: 18px;
            flex: 1;
            min-width: 70px;
            border-bottom: 6px solid var(--primary-blue);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .numero {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 1;
            display: block;
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #b2bec3;
            margin-top: 8px;
            display: block;
        }

        .caixa-segundos { border-bottom-color: var(--danger-red); }
        .caixa-segundos .numero { color: var(--danger-red); }

        /* AREA DA IMAGEM DO PERSONAGEM */
        .container-imagem {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .imagem-destaque {
            max-height: 320px; /* Altura ideal para o personagem */
            width: auto;
            display: block;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* BARRA DE PROGRESSO */
        .progress-wrapper {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
            width: 0%;
            transition: width 1s linear;
        }

        .vermelho-destaque {
            color: var(--danger-red); 
            font-weight: 900;
            font-size: 1.8rem;
            text-transform: uppercase;
            margin-top: 5px;
            line-height: 1.1;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-audio {
            background: #f1f3f5;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            color: #444;
        }

        .btn-share {
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .numero { font-size: 1.8rem; }
            .caixa { min-width: 60px; padding: 10px 2px; }
            .vermelho-destaque { font-size: 1.4rem; }
            .imagem-destaque { max-height: 250px; }
        }
    </style>
</head>
<body>

    <!-- Música de fundo -->
    <audio id="musicaFundo" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <!-- Brasão oficial -->
        <img src="brasao_pcrr.png" alt="Brasão PCRR" class="top-badge">
        
        <!-- Relógio de Contagem -->
        <div class="relogio-container">
            <div class="caixa">
                <span class="numero" id="dias">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="caixa">
                <span class="numero" id="horas">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="caixa">
                <span class="numero" id="minutos">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="caixa caixa-segundos">
                <span class="numero" id="segundos">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <!-- Personagem ajustado para foto-curso.png -->
        <div class="container-imagem">
            <img src="foto-curso.png" alt="Personagem PCRR" class="imagem-destaque">
        </div>

        <!-- Barra de Progresso -->
        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p style="font-weight: 600; color: #636e72; font-size: 0.9rem;">Para o início do</p>
        <h1 class="vermelho-destaque">Curso de Formação PCRR</h1>

        <!-- Controles -->
        <div class="controls">
            <button id="btnMusica" class="btn-audio">
                <i class="fas fa-play"></i> Ativar Trilha Sonora
            </button>

            <a href="#" id="whatsappBtn" class="btn-share" target="_blank">
                <i class="fab fa-whatsapp"></i> Compartilhar progresso
            </a>
        </div>
    </div>

    <script>
        // Lógica de Áudio
        const musica = document.getElementById('musicaFundo');
        const btnMusica = document.getElementById('btnMusica');
        
        btnMusica.addEventListener('click', function() {
            if (musica.paused) {
                musica.play();
                btnMusica.innerHTML = '<i class="fas fa-pause"></i> Pausar Trilha';
            } else {
                musica.pause();
                btnMusica.innerHTML = '<i class="fas fa-play"></i> Ativar Trilha Sonora';
            }
        });

        // Contagem Regressiva e Barra
        function atualizarTudo() {
            const dataFinal = new Date(2026, 8, 8, 0, 0, 0).getTime();
            const dataInicioReferencia = new Date(2024, 0, 1).getTime();

            setInterval(function() {
                const agora = new Date().getTime();
                const distancia = dataFinal - agora;

                if (distancia < 0) {
                    document.querySelector(".main-container").innerHTML = "<h1>O CURSO COMEÇOU! 👮‍♂️</h1>";
                    return;
                }

                // Cálculos de tempo
                const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
                const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distancia % (1000 * 60)) / 1000);

                // Inserir no HTML
                document.getElementById("dias").innerText = d.toString().padStart(2, '0');
                document.getElementById("horas").innerText = h.toString().padStart(2, '0');
                document.getElementById("minutos").innerText = m.toString().padStart(2, '0');
                document.getElementById("segundos").innerText = s.toString().padStart(2, '0');

                // Barra de Progresso
                const tempoTotal = dataFinal - dataInicioReferencia;
                const tempoPassado = agora - dataInicioReferencia;
                const porc = (tempoPassado / tempoTotal) * 100;
                document.getElementById("progressBar").style.width = Math.min(Math.max(porc, 0), 100) + "%";

                // Link WhatsApp
                const msg = encodeURIComponent(`Faltam ${d} dias para o Curso de Formação PCRR! 🔥`);
                document.getElementById("whatsappBtn").href = `https://wa.me/?text=${msg}`;

            }, 1000);
        }

        atualizarTudo();
    </script>
</body>
</html>
