<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva - PCRR</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0073CF;
            --accent-gold: #D4AF37;
            --danger-red: #cc0000;
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #ffffff 0%, #dfe6e9 100%);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Textura de fundo sutil */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.3;
            z-index: -1;
        }

        .main-container {
            text-align: center;
            background-color: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-top: 8px solid var(--accent-gold);
            width: 90%;
            max-width: 750px;
            position: relative;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-badge {
            width: 110px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .frase-topo {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #636e72;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .relogio-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .caixa {
            background: #f8f9fa;
            padding: 15px 5px;
            border-radius: 18px;
            min-width: 100px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border-bottom: 6px solid var(--primary-blue);
            transition: transform 0.3s ease;
        }

        .caixa:hover {
            transform: translateY(-5px);
        }

        .numero {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 1;
            display: block;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #b2bec3;
            margin-top: 8px;
            display: block;
        }

        .caixa-segundos { border-bottom-color: var(--danger-red); }
        .caixa-segundos .numero { color: var(--danger-red); }

        /* Barra de Progresso */
        .progress-wrapper {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
            width: 0%;
            transition: width 1s linear;
        }

        .vermelho-destaque {
            color: var(--danger-red); 
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            line-height: 1.1;
            margin-top: 10px;
        }

        .para-inicio {
            font-size: 1.2rem;
            font-weight: 600;
            color: #636e72;
        }

        /* Botões de Interação */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-audio {
            background: #f1f3f5;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-audio:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .btn-share {
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s;
        }

        .btn-share:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .numero { font-size: 2rem; }
            .caixa { min-width: 75px; }
            .vermelho-destaque { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Elemento de Áudio -->
    <audio id="musicaFundo" loop>
        <source src="musica.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

    <div class="main-container">
        <img src="brasao_pcrr.png" alt="Brasão PCRR" class="top-badge">
        
        <div class="frase-topo">Contagem Regressiva</div>

        <div class="relogio-container">
            <div class="caixa">
                <span class="numero" id="dias">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="caixa">
                <span class="numero" id="horas">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="caixa">
                <span class="numero" id="minutos">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="caixa caixa-segundos">
                <span class="numero" id="segundos">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p class="para-inicio">Para o início do</p>
        <h1 class="vermelho-destaque">Curso de Formação PCRR</h1>

        <div class="controls">
            <!-- Botão da Música -->
            <button id="btnMusica" class="btn-audio">
                <i id="iconeAudio" class="fas fa-play"></i> Ativar Trilha Sonora
            </button>

            <!-- Botão de Compartilhar -->
            <a href="#" id="whatsappBtn" class="btn-share" target="_blank">
                <i class="fab fa-whatsapp"></i> Compartilhar no WhatsApp
            </a>
        </div>
    </div>

    <script>
        // Configuração da Música
        const musica = document.getElementById('musicaFundo');
        const btnMusica = document.getElementById('btnMusica');
        const iconeAudio = document.getElementById('iconeAudio');

        btnMusica.addEventListener('click', function() {
            if (musica.paused) {
                musica.play();
                iconeAudio.classList.remove('fa-play');
                iconeAudio.classList.add('fa-pause');
                btnMusica.style.background = "#0073CF";
                btnMusica.style.color = "white";
                btnMusica.innerHTML = '<i class="fas fa-pause"></i> Pausar Trilha';
            } else {
                musica.pause();
                iconeAudio.classList.remove('fa-pause');
                iconeAudio.classList.add('fa-play');
                btnMusica.style.background = "#f1f3f5";
                btnMusica.style.color = "#444";
                btnMusica.innerHTML = '<i class="fas fa-play"></i> Ativar Trilha Sonora';
            }
        });

        // Função da Contagem
        function iniciarContagem() {
            const dataFinal = new Date(2026, 8, 8, 0, 0, 0).getTime();
            const dataInicioReferencia = new Date(2024, 0, 1).getTime(); // Para a barra de progresso

            setInterval(function() {
                const agora = new Date().getTime();
                const totalRestante = dataFinal - agora;
                const tempoTotalJornada = dataFinal - dataInicioReferencia;

                if (totalRestante <= 0) {
                    document.querySelector('.main-container').innerHTML = "<h1>O CURSO COMEÇOU! 👮‍♂️</h1>";
                    return;
                }

                const d = Math.floor(totalRestante / (1000 * 60 * 60 * 24));
                const h = Math.floor((totalRestante % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((totalRestante % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((totalRestante % (1000 * 60)) / 1000);

                // Atualiza números com zero à esquerda
                document.getElementById('dias').innerText = d.toString().padStart(2, '0');
                document.getElementById('horas').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutos').innerText = m.toString().padStart(2, '0');
                document.getElementById('segundos').innerText = s.toString().padStart(2, '0');

                // Atualiza Barra de Progresso
                const percentual = ((agora - dataInicioReferencia) / tempoTotalJornada) * 100;
                document.getElementById('progressBar').style.width = Math.min(Math.max(percentual, 0), 100) + "%";

                // Atualiza link de compartilhamento
                const texto = `Faltam ${d} dias para o Curso de Formação da PCRR! 💀🔥`;
                document.getElementById('whatsappBtn').href = `https://wa.me/?text=${encodeURIComponent(texto)}`;
                
            }, 1000);
        }

        iniciarContagem();
    </script>
</body>
</html>
