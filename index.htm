<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador em Tempo Real - PCRR</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            background-image: url('brasao_pcrr.png'); 
            background-size: 400px;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: screen; 
            color: #1a1a1a;
        }

        .main-container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.92);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            border: 2px solid #D4AF37;
            max-width: 700px;
            width: 90%;
        }

        .top-badge {
            width: 100px;
            margin-bottom: 1rem;
        }

        .frase-topo {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #333;
        }

        /* ESTILO DO RELÓGIO */
        .relogio-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .unidade {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            border-bottom: 4px solid #0073CF;
        }

        .numero {
            font-size: 3rem;
            font-weight: 900;
            color: #0073CF;
            display: block;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #666;
        }

        .vermelho-destaque {
            color: #cc0000; 
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1.8rem;
            display: block;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .numero { font-size: 1.8rem; }
            .unidade { min-width: 60px; padding: 10px; }
            .relogio-container { gap: 8px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <img src="brasao_pcrr.png" alt="Brasão PCRR" class="top-badge">
        
        <div class="frase-topo">Faltam exatamente:</div>

        <div class="relogio-container">
            <div class="unidade">
                <span class="numero" id="dias">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="unidade">
                <span class="numero" id="horas">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="unidade">
                <span class="numero" id="minutos">00</span>
                <span class="label">Min</span>
            </div>
            <div class="unidade" style="border-bottom-color: #cc0000;">
                <span class="numero" id="segundos">00</span>
                <span class="label">Seg</span>
            </div>
        </div>

        <div class="vermelho-destaque">Curso de Formação</div>
    </div>

    <script>
        function atualizarCronometro() {
            const dataAlvo = new Date('2026-09-08T00:00:00').getTime();
            
            // Função que roda a cada segundo
            const intervalo = setInterval(function() {
                const agora = new Date().getTime();
                const distancia = dataAlvo - agora;

                // Cálculos matemáticos para dias, horas, minutos e segundos
                const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
                const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distancia % (1000 * 60)) / 1000);

                // Exibe no HTML
                document.getElementById("dias").innerHTML = d;
                document.getElementById("horas").innerHTML = h < 10 ? "0" + h : h;
                document.getElementById("minutos").innerHTML = m < 10 ? "0" + m : m;
                document.getElementById("segundos").innerHTML = s < 10 ? "0" + s : s;

                // Se a contagem terminar
