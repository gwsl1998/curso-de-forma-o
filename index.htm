<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva - PCRR</title>
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0073CF;
            --accent-gold: #D4AF37;
            --danger-red: #cc0000;
            --bg-light: #f4f7f6;
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #ffffff 0%, #dfe6e9 100%);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Efeito de partículas/fundo sutil */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.3;
            z-index: -1;
        }

        .main-container {
            text-align: center;
            background-color: white;
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-top: 8px solid var(--accent-gold);
            width: 90%;
            max-width: 800px;
            position: relative;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-badge {
            width: 120px;
            margin-bottom: 25px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        
        .top-badge:hover {
            transform: scale(1.05);
        }

        .frase-topo {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #636e72;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .relogio-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .caixa {
            background: #f8f9fa;
            padding: 20px 10px;
            border-radius: 20px;
            min-width: 110px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border-bottom: 6px solid var(--primary-blue);
            transition: all 0.3s ease;
        }

        .caixa:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .numero {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 1;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #b2bec3;
            margin-top: 10px;
            display: block;
        }

        /* Estilo especial para o último bloco (Segundos) */
        .caixa-segundos {
            border-bottom-color: var(--danger-red);
        }
        .caixa-segundos .numero {
            color: var(--danger-red);
        }

        .info-footer {
            margin-top: 20px;
        }

        .para-inicio {
            font-size: 1.3rem;
            font-weight: 600;
            color: #636e72;
            margin-bottom: 10px;
        }

        .vermelho-destaque {
            color: var(--danger-red); 
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        /* Barra de Progresso */
        .progress-wrapper {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 10px;
            margin: 30px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
            width: 0%;
            transition: width 1s linear;
        }

        .btn-share {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .btn-share:hover {
            background-color: #128C7E;
        }

        @media (max-width: 600px) {
            .main-container { padding: 30px 15px; }
            .numero { font-size: 2.2rem; }
            .caixa { min-width: 75px; padding: 15px 5px; }
            .vermelho-destaque { font-size: 1.6rem; }
            .top-badge { width: 90px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Substitua pelo caminho real da sua imagem -->
        <img src="brasao_pcrr.png" alt="Brasão PCRR" class="top-badge">
        
        <div class="frase-topo">Contagem Regressiva</div>

        <div class="relogio-container">
            <div class="caixa">
                <span class="numero" id="dias">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="caixa">
                <span class="numero" id="horas">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="caixa">
                <span class="numero" id="minutos">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="caixa caixa-segundos">
                <span class="numero" id="segundos">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="info-footer">
            <p class="para-inicio">Para o início do</p>
            <h1 class="vermelho-destaque">Curso de Formação <br> PCRR</h1>
        </div>

        <a href="#" id="whatsappBtn" class="btn-share">
            <i class="fab fa-whatsapp"></i> Compartilhar progresso
        </a>
    </div>

    <script>
        function atualizarContagem() {
            // Data alvo: 08 de Setembro de 2026
            const dataFinal = new Date(2026, 8, 8, 0, 0, 0).getTime();
            // Data de referência para a barra de progresso (ex: 01/01/2024)
            const dataInicio = new Date(2024, 0, 1).getTime();

            const intervalo = setInterval(function() {
                const agora = new Date().getTime();
                const totalNecessario = dataFinal - dataInicio;
                const totalRestante = dataFinal - agora;

                if (totalRestante <= 0) {
                    clearInterval(intervalo);
                    document.querySelector('.main-container').innerHTML = `
                        <img src="brasao_pcrr.png" width="100">
                        <h1 style="color:var(--primary-blue); margin-top:20px;">O GRANDE DIA CHEGOU!</h1>
                        <p>Bom curso aos novos policiais!</p>
                    `;
                    return;
                }

                // Cálculos de tempo
                const d = Math.floor(totalRestante / (1000 * 60 * 60 * 24));
                const h = Math.floor((totalRestante % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((totalRestante % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((totalRestante % (1000 * 60)) / 1000);

                // Atualizar HTML
                document.getElementById('dias').innerText = d;
                document.getElementById('horas').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutos').innerText = m.toString().padStart(2, '0');
                document.getElementById('segundos').innerText = s.toString().padStart(2, '0');

                // Barra de Progresso
                const progresso = ((agora - dataInicio) / totalNecessario) * 100;
                document.getElementById('progressBar').style.width = Math.min(Math.max(progresso, 0), 100) + "%";

                // Atualizar link do WhatsApp dinamicamente
                const msg = encodeURIComponent(`Faltam ${d} dias para o Curso de Formação da PCRR! 👮‍♂️🔥`);
                document.getElementById('whatsappBtn').href = `https://wa.me/?text=${msg}`;

            }, 1000);
        }

        atualizarContagem();
    </script>
</body>
</html>
