<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva - PCRR</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .main-container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #D4AF37;
            width: 95%;
            max-width: 750px;
        }

        .top-badge {
            width: 100px;
            margin-bottom: 20px;
        }

        .frase-topo {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #333;
            text-transform: uppercase;
        }

        .relogio-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .caixa {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 12px;
            min-width: 85px;
            border-bottom: 5px solid #0073CF;
        }

        .numero {
            font-size: 2.8rem;
            font-weight: 800;
            color: #0073CF;
            display: block;
            line-height: 1;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #777;
            margin-top: 8px;
            display: block;
        }

        .para-inicio {
            font-size: 1.2rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .vermelho-destaque {
            color: #cc0000; 
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            display: block;
        }

        @media (max-width: 600px) {
            .numero { font-size: 1.8rem; }
            .caixa { min-width: 65px; padding: 10px; }
            .relogio-container { gap: 6px; }
            .vermelho-destaque { font-size: 1.5rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <img src="brasao_pcrr.png" alt="Brasão PCRR" class="top-badge">
        
        <div class="frase-topo">Faltam exatamente:</div>

        <div class="relogio-container">
            <div class="caixa">
                <span class="numero" id="dias">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="caixa">
                <span class="numero" id="horas">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="caixa">
                <span class="numero" id="minutos">00</span>
                <span class="label">Min</span>
            </div>
            <div class="caixa" style="border-bottom-color: #cc0000;">
                <span class="numero" id="segundos">00</span>
                <span class="label">Seg</span>
            </div>
        </div>

        <div class="para-inicio">Para o início do</div>
        <div class="vermelho-destaque">Curso de Formação</div>
    </div>

    <script>
        function iniciarContagem() {
            // Data alvo: 08 de Setembro de 2026
            const dataFinal = new Date(2026, 8, 8, 0, 0, 0).getTime();

            setInterval(function() {
                const agora = new Date().getTime();
                const total = dataFinal - agora;

                if (total <= 0) {
                    document.querySelector('.main-container').innerHTML = "<h1>O curso começou!</h1>";
                    return;
                }

                const d = Math.floor(total / (1000 * 60 * 60 * 24));
                const h = Math.floor((total % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((total % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((total % (1000 * 60)) / 1000);

                document.getElementById('dias').innerText = d;
                document.getElementById('horas').innerText = h < 10 ? '0' + h : h;
                document.getElementById('minutos').innerText = m < 10 ? '0' + m : m;
                document.getElementById('segundos').innerText = s < 10 ? '0' + s : s;
            }, 1000);
        }

        iniciarContagem();
    </script>
</body>
</html>
