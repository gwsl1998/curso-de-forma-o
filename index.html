<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PCRR - Contagem Regressiva Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #002D5B; 
            --gold: #B8860B;  
            --red: #C0392B;   
            --light-bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0e14;
            /* Fundo com padrão sutil e gradiente escuro */
            background-image: 
                linear-gradient(rgba(0, 45, 91, 0.9), rgba(10, 14, 20, 0.95)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .main-container {
            background: var(--glass);
            width: 100%;
            max-width: 650px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Detalhe no topo */
        .main-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--navy), var(--gold), var(--navy));
        }

        .brasao {
            width: 90px;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }
        .brasao:hover { transform: scale(1.05); }

        .subtitulo {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 600;
            color: #718096;
            margin-bottom: 10px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .timer-box {
            background: #fff;
            padding: 20px 10px;
            border-radius: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--navy);
            display: block;
            line-height: 1;
        }

        .timer-box.segundos .number {
            color: var(--red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); }
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #888;
            margin-top: 8px;
            display: block;
        }

        .frase-final {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--navy);
            text-transform: uppercase;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .progress-container {
            margin-bottom: 25px;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .track {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--navy), #1a5a99);
            box-shadow: 0 0 10px rgba(0,45,91,0.3);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .foto-je {
            height: 220px; 
            width: auto;
            max-width: 100%;
            display: block;
            margin: 0 auto 20px auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.25));
            transition: transform 0.3s ease;
        }
        .foto-je:hover {
            transform: scale(1.03);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
            border: none;
        }

        .btn-audio { 
            background: white; 
            color: var(--navy); 
            border: 2px solid var(--navy);
        }
        
        .btn-audio:hover { 
            background: var(--navy); 
            color: white; 
        }

        @media (max-width: 600px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
            .main-container { padding: 30px 20px; }
            .foto-je { height: 160px; }
            .frase-final { font-size: 1.1rem; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <header>
            <img src="brasao_pcrr.png" alt="Brasão PC-RR" class="brasao" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022484.png'">
            <h2 class="subtitulo">Faltam apenas</h2>
        </header>

        <section class="timer-grid">
            <div class="timer-box">
                <span class="number" id="d">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="timer-box">
                <span class="number" id="h">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="timer-box">
                <span class="number" id="m">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="timer-box segundos">
                <span class="number" id="s">00</span>
                <span class="label">Segundos</span>
            </div>
        </section>

        <h1 class="frase-final">Para o início do Curso de Formação da PC-RR</h1>

        <section class="progress-container">
            <div class="progress-header">
                <span>Esperômetro</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="track">
                <div class="fill" id="bar"></div>
            </div>
        </section>

        <img src="JE.png" alt="Personagem JE" class="foto-je">

        <div class="btn-group">
            <button class="btn btn-audio" id="btnPlay">
                <i class="fas fa-play"></i> Canção do CR
            </button>
        </div>
    </div>

    <script>
        const DATA_OBJETIVO = new Date(2026, 8, 8, 0, 0, 0).getTime();
        const DATA_INICIAL = new Date(2026, 2, 1, 0, 0, 0).getTime(); 

        const audio = document.getElementById('musica');
        const btnM = document.getElementById('btnPlay');

        btnM.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => alert("Clique na tela primeiro para permitir o áudio!"));
                btnM.innerHTML = '<i class="fas fa-pause"></i> Pausar canção';
                btnM.style.background = "#002D5B";
                btnM.style.color = "white";
            } else {
                audio.pause();
                btnM.innerHTML = '<i class="fas fa-play"></i> Canção do CR';
                btnM.style.background = "white";
                btnM.style.color = "#002D5B";
            }
        });

        function engine() {
            const agora = new Date().getTime();
            const diff = DATA_OBJETIVO - agora;

            if (diff <= 0) {
                document.querySelector('.main-container').innerHTML = `
                    <img src="brasao_pcrr.png" width="100" style="margin-bottom:20px">
                    <h1 style="color:var(--navy); margin-bottom:20px">CHEGOU A HORA! 👮‍♂️</h1>
                    <p style="font-weight:800; text-transform:uppercase">O curso de formação começou.</p>
                `;
                return;
            }

            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const segs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('d').innerText = dias.toString().padStart(2, '0');
            document.getElementById('h').innerText = horas.toString().padStart(2, '0');
            document.getElementById('m').innerText = mins.toString().padStart(2, '0');
            document.getElementById('s').innerText = segs.toString().padStart(2, '0');

            const total = DATA_OBJETIVO - DATA_INICIAL;
            const decorrido = agora - DATA_INICIAL;
            let perc = (decorrido / total) * 100;
            perc = Math.min(Math.max(perc, 0), 100);

            document.getElementById('bar').style.width = perc.toFixed(2) + "%";
            document.getElementById('percent-text').innerText = Math.floor(perc) + "%";
        }

        setInterval(engine, 1000);
        engine();
    </script>
</body>
</html>
