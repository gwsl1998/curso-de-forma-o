<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>PCRR - Contagem Regressiva</title>
    
    <!-- Fontes: Montserrat e Orbitron para o botão -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #002D5B; 
            --gold: #B8860B;  
            --red: #C0392B;   
            --dark-base: #0a0e14;
            --glass: rgba(255, 255, 255, 0.95);
        }

        /* --- TELA DE SPLASH --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--dark-base);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { width: 120px; margin-bottom: 20px; animation: heartbeat 1.5s ease-in-out infinite; }
        .splash-text { color: white; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; opacity: 0.7; }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(184, 134, 11, 0.5)); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(184, 134, 11, 0.5)); }
            100% { transform: scale(1); }
        }
        .hidden-splash { opacity: 0; visibility: hidden; }

        /* --- MODO HUD (OPERAÇÕES NOTURNAS) --- */
        .hud-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 9998;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 9997;
            pointer-events: none;
            opacity: 0;
        }

        /* Ativação do Modo HUD */
        body.music-on .hud-overlay, 
        body.music-on .scanlines { opacity: 1; }

        /* --- ESTILOS GERAIS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-base) !important;
            background-image: linear-gradient(rgba(0, 45, 91, 0.9), rgba(10, 14, 20, 0.95)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png') !important;
            background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #333; overflow-x: hidden;
        }

        .main-container {
            background: var(--glass); width: 100%; max-width: 650px;
            padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); text-align: center; position: relative; overflow: hidden; z-index: 10;
            transition: transform 0.5s ease;
        }

        .main-container::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--navy), var(--gold), var(--navy)); }

        .brasao { width: 90px; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        .subtitulo { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 600; color: #718096; margin-bottom: 10px; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 30px; }
        .timer-box { background: #fff; padding: 20px 10px; border-radius: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .number { font-size: 2.5rem; font-weight: 900; color: var(--navy); display: block; line-height: 1; }
        .timer-box.segundos .number { color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); } }
        .label { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: #888; margin-top: 8px; display: block; }

        .progress-container { margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 20px; }
        .track { width: 100%; height: 14px; background: #e9ecef; border-radius: 10px; overflow: hidden; position: relative; }
        .fill { height: 100%; width: 0%; background: var(--navy); position: relative; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background 2s ease; box-shadow: 0 0 15px rgba(0, 45, 91, 0.4); }
        .fill::after { content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: sweep 3s infinite; }
        @keyframes sweep { 0% { left: -100%; } 100% { left: 150%; } }

        .foto-je { height: 220px; width: auto; max-width: 100%; display: block; margin: 0 auto; position: relative; z-index: 2; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .shadow-je { width: 120px; height: 12px; background: rgba(0,0,0,0.15); margin: -10px auto 20px auto; border-radius: 50%; filter: blur(6px); animation: pulse-shadow 2s ease-in-out infinite; }
        @keyframes pulse-shadow { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 0.5; } }

        .frase-final { font-size: 1.4rem; font-weight: 900; color: var(--navy); text-transform: uppercase; margin-bottom: 20px; line-height: 1.2; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        
        /* BOTÃO PREMIUM ORBITRON */
        .btn-audio { 
            padding: 15px 25px; border-radius: 50px; font-weight: 700; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s; text-transform: uppercase; 
            background: white; color: var(--navy); border: 2px solid var(--navy); font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
        }
        .btn-audio:hover { background: var(--navy); color: white; }

        .terminal-container {
            background: #050a0f; color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 0.75rem; padding: 12px; border-radius: 10px; margin-top: 20px; text-align: left; min-height: 45px; border: 1px solid #1a2a3a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); display: flex; align-items: center;
        }
        .terminal-prefix { color: #888; margin-right: 5px; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff41; margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle; }

        @media (max-width: 600px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
            .foto-je { height: 160px; }
            .frase-final { font-size: 1.1rem; }
            .btn-group { flex-direction: column; }
            .btn-audio { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body id="corpo">

    <!-- CAMADAS DO MODO HUD -->
    <div class="hud-overlay"></div>
    <div class="scanlines"></div>

    <div id="splash-screen">
        <img src="brasao_pcrr.png" alt="Carregando..." class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022484.png'">
        <div class="splash-text">Sincronizando HUD...</div>
    </div>

    <div class="modal-overlay" id="modalAlerta">
        <div class="modal-box">
            <h2>DECORE A CANÇÃO, ALUNO!</h2>
            <button onclick="document.getElementById('modalAlerta').style.display='none'; localStorage.setItem('alertaPcrrExibido','true'); vibrar();" style="background:var(--navy); color:white; padding:12px 30px; border-radius:50px; border:none; font-weight:800; cursor:pointer; text-transform:uppercase;">ENTENDIDO!</button>
        </div>
    </div>

    <audio id="musica" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div class="main-container">
        <header>
            <img src="brasao_pcrr.png" alt="Brasão PC-RR" class="brasao" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022484.png'">
            <h2 class="subtitulo">Faltam apenas</h2>
        </header>

        <section class="timer-grid">
            <div class="timer-box"><span class="number" id="d">00</span><span class="label">Dias</span></div>
            <div class="timer-box"><span class="number" id="h">00</span><span class="label">Horas</span></div>
            <div class="timer-box"><span class="number" id="m">00</span><span class="label">Minutos</span></div>
            <div class="timer-box segundos"><span class="number" id="s">00</span><span class="label">Segundos</span></div>
        </section>

        <h1 class="frase-final">Para o início do Curso de Formação da PC-RR</h1>

        <section class="progress-container">
            <div class="progress-header" style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:800; color:var(--navy); margin-bottom:10px; text-transform:uppercase;">
                <span>Esperômetro</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="track"><div class="fill" id="bar"></div></div>
        </section>

        <img src="JE.gif" alt="Personagem JE" class="foto-je">
        <div class="shadow-je"></div>

        <div class="btn-group">
            <button class="btn-audio" id="btnPlay"><i class="fas fa-volume-high"></i> CANÇÃO DO CR</button>
        </div>

        <div class="terminal-container">
            <span class="terminal-prefix">></span><span id="terminal-text"></span><span class="cursor"></span>
        </div>
    </div>

    <script>
        function vibrar() { if (navigator.vibrate) navigator.vibrate(40); }

        window.onload = function() {
            setTimeout(function() {
                document.getElementById('splash-screen').classList.add('hidden-splash');
                if (!localStorage.getItem('alertaPcrrExibido')) {
                    document.getElementById('modalAlerta').style.display = 'flex';
                }
                startTerminal();
            }, 2500);
        };

        // --- LÓGICA DO TERMINAL ---
        const frasesMotivacionais = [
            "A vitória ama a preparação.",
            "Onde o corpo cansa, a mente descansa.",
            "O distintivo não se compra, se conquista.",
            "Padrão e disciplina sempre.",
            "Mantenha o foco na missão."
        ];

        const diaDoAno = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const fraseDoDia = frasesMotivacionais[diaDoAno % frasesMotivacionais.length];

        const terminalStringsPadrao = [
            "[UNIDADE]: Aluno bisonho em preparação...",
            "[COMANDO]: Prepare a carcaça, aluno!",
            "[MISSAO]: " + fraseDoDia
        ];

        let stringIdx = 0, charIdx = 0;
        let isMusicPlaying = false; // Controle da música
        const terminalEl = document.getElementById('terminal-text');

        function typeTerminal() {
            // Se a música estiver tocando, trava na mensagem da canção
            if (isMusicPlaying) {
                terminalEl.textContent = "Decore a canção, aluno!";
                return; 
            }

            if (charIdx < terminalStringsPadrao[stringIdx].length) {
                terminalEl.textContent += terminalStringsPadrao[stringIdx].charAt(charIdx);
                charIdx++;
                setTimeout(typeTerminal, 50);
            } else {
                setTimeout(eraseTerminal, 3000);
            }
        }

        function eraseTerminal() {
            if (isMusicPlaying) return; // Não apaga se a música estiver tocando

            if (charIdx > 0) {
                terminalEl.textContent = terminalStringsPadrao[stringIdx].substring(0, charIdx - 1);
                charIdx--;
                setTimeout(eraseTerminal, 20);
            } else {
                stringIdx = (stringIdx + 1) % terminalStringsPadrao.length;
                setTimeout(typeTerminal, 500);
            }
        }

        function startTerminal() { typeTerminal(); }

        // --- CONTROLE DE ÁUDIO E HUD ---
        const audio = document.getElementById('musica');
        const btnM = document.getElementById('btnPlay');
        const corpo = document.getElementById('corpo');

        btnM.addEventListener('click', () => {
            vibrar();
            if (audio.paused) {
                audio.play();
                isMusicPlaying = true;
                btnM.innerHTML = '<i class="fas fa-volume-xmark"></i> PAUSAR CANÇÃO';
                corpo.classList.add('music-on'); // Ativa o HUD
                terminalEl.textContent = "Decore a canção, aluno!"; // Muda terminal na hora
            } else {
                audio.pause();
                isMusicPlaying = false;
                btnM.innerHTML = '<i class="fas fa-volume-high"></i> CANÇÃO DO CR';
                corpo.classList.remove('music-on'); // Desativa o HUD
                charIdx = 0; // Reseta o terminal para voltar ao ciclo
                typeTerminal(); 
            }
        });

        // --- ENGINE DO TIMER ---
        const DATA_OBJETIVO = new Date(2026, 8, 8, 0, 0, 0).getTime();
        const DATA_INICIAL = new Date(2026, 2, 1, 0, 0, 0).getTime(); 

        function engine() {
            const agora = new Date().getTime();
            const diff = DATA_OBJETIVO - agora;

            if (diff <= 0) {
                document.querySelector('.main-container').innerHTML = `<h1>CHEGOU A HORA! 👮‍♂️</h1>`;
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('d').innerText = d.toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            document.title = d + " Dias - PCRR";

            const total = DATA_OBJETIVO - DATA_INICIAL;
            const decorrido = agora - DATA_INICIAL;
            let perc = Math.min(Math.max((decorrido / total) * 100, 0), 100);

            const bar = document.getElementById('bar');
            bar.style.width = perc.toFixed(2) + "%";
            document.getElementById('percent-text').innerText = Math.floor(perc) + "%";
        }

        setInterval(engine, 1000);
        engine();
    </script>
</body>
</html>
