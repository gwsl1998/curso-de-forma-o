<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>PCRR - Contagem Regressiva</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #002D5B; 
            --gold: #B8860B;  
            --red: #C0392B;   
            --dark-base: #0a0e14;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-base);
            background-image: linear-gradient(rgba(0, 45, 91, 0.92), rgba(10, 14, 20, 0.96)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            color: #333; 
            overflow-x: hidden;
        }

        /* --- TELA DE SPLASH --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--dark-base);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { width: 100px; margin-bottom: 20px; animation: heartbeat 1.5s ease-in-out infinite; }
        .splash-text { color: white; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; opacity: 0.8; }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(184, 134, 11, 0.4)); }
        }
        .hidden-splash { opacity: 0; visibility: hidden; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            border-top: 10px solid var(--navy);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-modal {
            background: var(--navy); color: white; padding: 12px 30px;
            border-radius: 50px; border: none; font-weight: 800;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
            margin-top: 20px; font-size: 0.8rem;
        }

        /* --- CONTAINER PRINCIPAL --- */
        .main-container {
            background: var(--glass); 
            width: 100%; 
            max-width: 600px;
            padding: 40px 25px; 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); 
            text-align: center; 
            position: relative; 
            z-index: 10;
        }

        .main-container::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--navy), var(--gold), var(--navy)); border-radius: 30px 30px 0 0; }

        .brasao { width: 90px; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        .subtitulo { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 4px; font-weight: 600; color: #718096; margin-bottom: 15px; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .timer-box { background: #fff; padding: 20px 5px; border-radius: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .number { font-size: 2.2rem; font-weight: 900; color: var(--navy); display: block; line-height: 1; }
        .timer-box.segundos .number { color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .label { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; color: #888; margin-top: 8px; display: block; }

        .progress-container { margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 20px; }
        .track { width: 100%; height: 14px; background: #e9ecef; border-radius: 10px; overflow: hidden; position: relative; }
        .fill { height: 100%; width: 0%; background: var(--navy); transition: width 1s ease-in-out; }

        .foto-je { height: 200px; width: auto; display: block; margin: 0 auto; position: relative; z-index: 2; object-fit: contain; }
        .shadow-je { width: 110px; height: 12px; background: rgba(0,0,0,0.15); margin: -10px auto 20px auto; border-radius: 50%; filter: blur(6px); animation: pulse-shadow 2s ease-in-out infinite; }
        @keyframes pulse-shadow { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 0.5; } }

        .frase-final { font-size: 1.2rem; font-weight: 900; color: var(--navy); text-transform: uppercase; margin-bottom: 25px; line-height: 1.3; }

        .btn-audio { 
            width: 100%; padding: 18px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; text-transform: uppercase; 
            background: white; color: var(--navy); border: 2px solid var(--navy); font-family: 'Orbitron', sans-serif; 
        }
        .btn-audio:active { transform: scale(0.96); }

        .terminal-container {
            background: #050a0f; color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 0.75rem; padding: 12px; border-radius: 10px; margin-top: 25px; text-align: left; min-height: 50px; border: 1px solid #1a2a3a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); display: flex; align-items: center;
        }
        .terminal-prefix { color: #888; margin-right: 5px; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff41; margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle; }

        @media (max-width: 600px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .number { font-size: 1.8rem; }
            .foto-je { height: 160px; }
            .frase-final { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- TELA DE SPLASH -->
    <div id="splash-screen">
        <img src="brasao_pcrr.png" alt="PCRR" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022484.png'">
        <!-- FRASE FIXA SOLICITADA -->
        <div class="splash-text">Paciência Aluno...</div>
    </div>

    <!-- MODAL DE ENTRADA -->
    <div class="modal-overlay" id="modalAlerta">
        <div class="modal-box">
            <h2>DECORE A CANÇÃO, ALUNO!</h2>
            <button class="btn-modal" onclick="fecharAlerta()">ENTENDIDO!</button>
        </div>
    </div>

    <audio id="musica" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div class="main-container">
        <header>
            <img src="brasao_pcrr.png" alt="Brasão PC-RR" class="brasao" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022484.png'">
            <h2 class="subtitulo">Faltam apenas</h2>
        </header>

        <section class="timer-grid">
            <div class="timer-box"><span class="number" id="d">00</span><span class="label">Dias</span></div>
            <div class="timer-box"><span class="number" id="h">00</span><span class="label">Horas</span></div>
            <div class="timer-box"><span class="number" id="m">00</span><span class="label">Minutos</span></div>
            <div class="timer-box segundos"><span class="number" id="s">00</span><span class="label">Segundos</span></div>
        </section>

        <h1 class="frase-final">Para o início do Curso de Formação da PC-RR</h1>

        <section class="progress-container">
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:800; color:var(--navy); margin-bottom:10px; text-transform:uppercase;">
                <span>Esperômetro</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="track"><div class="fill" id="bar"></div></div>
        </section>

        <img src="JE.gif" alt="JE" class="foto-je">
        <div class="shadow-je"></div>

        <div class="btn-group">
            <button class="btn-audio" id="btnPlay"><i class="fas fa-volume-high"></i> CANÇÃO DO CR</button>
        </div>

        <div class="terminal-container">
            <span class="terminal-prefix">></span><span id="terminal-text"></span><span class="cursor"></span>
        </div>
    </div>

    <script>
        function vibrar() { if (navigator.vibrate) navigator.vibrate(40); }

        window.onload = function() {
            setTimeout(function() {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                if (!localStorage.getItem('alertaPcrrExibido')) {
                    document.getElementById('modalAlerta').style.display = 'flex';
                }
                startTerminal();
            }, 2500);
        };

        function fecharAlerta() {
            vibrar();
            document.getElementById('modalAlerta').style.display = 'none';
            localStorage.setItem('alertaPcrrExibido', 'true');
        }

        // --- TERMINAL ---
        const frasesMotivacionais = [
            "A vitória ama a preparação.",
            "Onde o corpo cansa, a mente descansa.",
            "O distintivo não se compra, se conquista.",
            "Padrão e disciplina sempre.",
            "Treine enquanto eles dormem."
        ];
        const diaDoAno = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const fraseDoDia = frasesMotivacionais[diaDoAno % frasesMotivacionais.length];
        const terminalStringsPadrao = ["[UNIDADE]: Aluno bisonho em preparação...", "[COMANDO]: Prepare a carcaça, aluno!", "[MISSAO]: " + fraseDoDia];
        
        let stringIdx = 0, charIdx = 0, isMusicPlaying = false;
        const terminalEl = document.getElementById('terminal-text');

        function typeTerminal() {
            if (isMusicPlaying) { terminalEl.textContent = "Decore a canção, aluno!"; return; }
            if (charIdx < terminalStringsPadrao[stringIdx].length) {
                terminalEl.textContent += terminalStringsPadrao[stringIdx].charAt(charIdx);
                charIdx++; setTimeout(typeTerminal, 50);
            } else { setTimeout(eraseTerminal, 3000); }
        }

        function eraseTerminal() {
            if (isMusicPlaying) return;
            if (charIdx > 0) {
                terminalEl.textContent = terminalStringsPadrao[stringIdx].substring(0, charIdx - 1);
                charIdx--; setTimeout(eraseTerminal, 20);
            } else { stringIdx = (stringIdx + 1) % terminalStringsPadrao.length; setTimeout(typeTerminal, 500); }
        }
        function startTerminal() { typeTerminal(); }

        // --- AUDIO ---
        const audio = document.getElementById('musica');
        const btnM = document.getElementById('btnPlay');

        btnM.addEventListener('click', () => {
            vibrar();
            if (audio.paused) {
                audio.play();
                isMusicPlaying = true;
                btnM.innerHTML = '<i class="fas fa-volume-xmark"></i> PAUSAR CANÇÃO';
                terminalEl.textContent = "Decore a canção, aluno!";
            } else {
                audio.pause();
                isMusicPlaying = false;
                btnM.innerHTML = '<i class="fas fa-volume-high"></i> CANÇÃO DO CR';
                charIdx = 0; typeTerminal(); 
            }
        });

        // --- TIMER ---
        const DATA_OBJETIVO = new Date(2026, 8, 8, 0, 0, 0).getTime();
        const DATA_INICIAL = new Date(2026, 2, 1, 0, 0, 0).getTime(); 

        function engine() {
            const agora = new Date().getTime();
            const diff = DATA_OBJETIVO - agora;
            if (diff <= 0) { document.querySelector('.main-container').innerHTML = `<h1>CHEGOU A HORA! 👮‍♂️</h1>`; return; }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('d').innerText = d.toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            document.title = d + " Dias - PCRR";

            const total = DATA_OBJETIVO - DATA_INICIAL;
            const decorrido = agora - DATA_INICIAL;
            let perc = Math.min(Math.max((decorrido / total) * 100, 0), 100);
            document.getElementById('bar').style.width = perc.toFixed(2) + "%";
            document.getElementById('percent-text').innerText = Math.floor(perc) + "%";
        }
        setInterval(engine, 1000); engine();
    </script>
</body>
</html>
