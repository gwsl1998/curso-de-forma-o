<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PCRR - Contagem Regressiva Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #002D5B; 
            --gold: #B8860B;  
            --red: #C0392B;   
            --light-bg: #F1F5F9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-bg);
            background-image: radial-gradient(#CBD5E0 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            background: #FFFFFF;
            width: 100%;
            max-width: 700px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
            border-top: 12px solid var(--navy);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brasao {
            width: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .subtitulo {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            color: #718096;
            margin-bottom: 20px;
        }

        /* --- ESTILO DA NOVA IMAGEM --- */
        .foto-curso {
            width: auto;
            max-width: 100%;
            height: 250px; /* Altura ideal para não empurrar o relógio para fora da tela */
            object-fit: contain;
            margin-bottom: 25px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
            transition: transform 0.3s ease;
        }
        .foto-curso:hover {
            transform: scale(1.02);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        .timer-box {
            background: #FFFFFF;
            padding: 20px 5px;
            border-radius: 16px;
            border: 1px solid #E2E8F0;
            border-bottom: 5px solid var(--navy);
        }

        .timer-box.segundos { border-bottom-color: var(--red); }

        .number {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--navy);
            line-height: 1;
        }

        .timer-box.segundos .number { color: var(--red); }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #A0AEC0;
            margin-top: 8px;
            display: block;
        }

        .progress-container {
            margin-bottom: 40px;
            text-align: left;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .track {
            width: 100%;
            height: 14px;
            background: #EDF2F7;
            border-radius: 50px;
            overflow: hidden;
            border: 1px solid #E2E8F0;
        }

        .fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--navy), var(--gold));
            transition: width 1s linear;
        }

        .frase-final {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--navy);
            text-transform: uppercase;
            line-height: 1.2;
            margin-top: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 35px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            border: none;
        }

        .btn-audio { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
        .btn-audio:hover { background: var(--navy); color: white; }
        .btn-share { background: #27AE60; color: white; box-shadow: 0 4px 14px rgba(39, 174, 96, 0.3); }

        @media (max-width: 600px) {
            .foto-curso { height: 180px; } /* Menor no celular para caber tudo */
            .timer-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .number { font-size: 2.2rem; }
            .frase-final { font-size: 1.2rem; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <header>
            <img src="brasao_pcrr.png" alt="Brasão PC-RR" class="brasao">
            <h2 class="subtitulo">Faltam apenas</h2>
            
            <!-- AQUI ESTÁ SUA IMAGEM CONFIGURADA -->
            <img src="foto-curso.png" alt="Policial PCRR" class="foto-curso">
        </header>

        <section class="timer-grid">
            <div class="timer-box">
                <span class="number" id="d">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="timer-box">
                <span class="number" id="h">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="timer-box">
                <span class="number" id="m">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="timer-box segundos">
                <span class="number" id="s">00</span>
                <span class="label">Segundos</span>
            </div>
        </section>

        <section class="progress-container">
            <div class="progress-header">
                <span>Conclusão da Jornada</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="track">
                <div class="fill" id="bar"></div>
            </div>
        </section>

        <footer class="footer-text">
            <h1 class="frase-final">Para o início do curso de formação da PC-RR</h1>
        </footer>

        <div class="btn-group">
            <button class="btn btn-audio" id="btnPlay">
                <i class="fas fa-play"></i> Ativar Trilha
            </button>
            <a href="#" class="btn btn-share" id="waShare" target="_blank">
                <i class="fab fa-whatsapp"></i> Compartilhar
            </a>
        </div>
    </div>

    <script>
        // O restante do seu script permanece igual
        const audio = document.getElementById('musica');
        const btnM = document.getElementById('btnPlay');

        btnM.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btnM.innerHTML = '<i class="fas fa-pause"></i> Pausar Trilha';
                btnM.style.background = "#002D5B";
                btnM.style.color = "white";
            } else {
                audio.pause();
                btnM.innerHTML = '<i class="fas fa-play"></i> Ativar Trilha';
                btnM.style.background = "transparent";
                btnM.style.color = "#002D5B";
            }
        });

        function engine() {
            const dataFinal = new Date(2026, 8, 8, 0, 0, 0).getTime();
            const dataInicial = new Date(2026, 2, 1, 0, 0, 0).getTime(); 
            
            const agora = new Date().getTime();
            const diff = dataFinal - agora;

            if (diff <= 0) {
                document.querySelector('.main-container').innerHTML = "<h1>O CURSO COMEÇOU! 👮‍♂️</h1>";
                return;
            }

            const dias = Math.floor(diff / 86400000);
            const horas = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const segs = Math.floor((diff % 60000) / 1000);

            document.getElementById('d').innerText = dias.toString().padStart(2, '0');
            document.getElementById('h').innerText = horas.toString().padStart(2, '0');
            document.getElementById('m').innerText = mins.toString().padStart(2, '0');
            document.getElementById('s').innerText = segs.toString().padStart(2, '0');

            const tempoTotalJornada = dataFinal - dataInicial;
            const tempoDecorrido = agora - dataInicial;
            let porcentagem = (tempoDecorrido / tempoTotalJornada) * 100;
            porcentagem = Math.min(Math.max(porcentagem, 0), 100);

            document.getElementById('bar').style.width = porcentagem.toFixed(2) + "%";
            document.getElementById('percent-text').innerText = Math.floor(porcentagem) + "%";

            const txt = encodeURIComponent(`Faltam ${dias} dias para o início do curso de formação da PC-RR! 🚔💀`);
            document.getElementById('waShare').href = `https://wa.me/?text=${txt}`;
        }

        setInterval(engine, 1000);
        engine();
    </script>
</body>
</html>
